events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  upstream web { zone web 64k; server web:3000 resolve; }
  upstream requirements_api { zone requirements_api 64k; server requirements-api:8080 resolve; }
  upstream activities_api { zone activities_api 64k; server activities-api:8080 resolve; }
  upstream evidence_api { zone evidence_api 64k; server evidence-api:8080 resolve; }
  upstream identity_api { zone identity_api 64k; server identity-api:8080 resolve; }
  upstream administration_api { zone administration_api 64k; server administration-api:8080 resolve; }

  server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    client_max_body_size 50m;

    location / {
      proxy_pass http://web;
    }

    location /api/requirements/ {
      rewrite ^/api/requirements/(.*)$ /requirements/$1 break;
      proxy_pass http://requirements_api;
    }

    location = /api/requirements {
      rewrite ^/api/requirements$ /requirements break;
      proxy_pass http://requirements_api;
    }

    location /api/activities/ {
      rewrite ^/api/activities/(.*)$ /activities/$1 break;
      proxy_pass http://activities_api;
    }

    location = /api/activities {
      rewrite ^/api/activities$ /activities break;
      proxy_pass http://activities_api;
    }

    location /api/notification-settings/ {
      rewrite ^/api/notification-settings/(.*)$ /notification-settings/$1 break;
      proxy_pass http://activities_api;
    }

    location = /api/notification-settings {
      rewrite ^/api/notification-settings$ /notification-settings break;
      proxy_pass http://activities_api;
    }

    location /api/evidence/ {
      rewrite ^/api/evidence/(.*)$ /evidence/$1 break;
      proxy_pass http://evidence_api;
    }

    location = /api/evidence {
      rewrite ^/api/evidence$ /evidence break;
      proxy_pass http://evidence_api;
    }

    location /api/approvals/ {
      rewrite ^/api/approvals/(.*)$ /approvals/$1 break;
      proxy_pass http://evidence_api;
    }

    location = /api/approvals {
      rewrite ^/api/approvals$ /approvals break;
      proxy_pass http://evidence_api;
    }

    location /api/storage-settings/ {
      rewrite ^/api/storage-settings/(.*)$ /storage-settings/$1 break;
      proxy_pass http://evidence_api;
    }

    location = /api/storage-settings {
      rewrite ^/api/storage-settings$ /storage-settings break;
      proxy_pass http://evidence_api;
    }

    location /api/files/ {
      rewrite ^/api/files/(.*)$ /files/$1 break;
      proxy_pass http://evidence_api;
    }

    location /api/auth/ {
      rewrite ^/api/auth/(.*)$ /auth/$1 break;
      proxy_pass http://identity_api;
    }

    location /api/identity/ {
      rewrite ^/api/identity/(.*)$ /$1 break;
      proxy_pass http://identity_api;
    }

    location /api/admin/ {
      rewrite ^/api/admin/(.*)$ /$1 break;
      proxy_pass http://administration_api;
    }
  }
}
