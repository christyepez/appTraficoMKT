name: CI

on:
  pull_request:
    branches:
      - main
      - develop
      - test
  push:
    branches:
      - feature/**
      - hotfix/**

jobs:
  validate:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore backend
        run: dotnet restore backend/RequirementsPlatform.slnx

      - name: Build backend
        run: dotnet build backend/RequirementsPlatform.slnx --configuration Release --no-restore

      - name: Test backend
        run: dotnet test backend/RequirementsPlatform.slnx --configuration Release --no-build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
